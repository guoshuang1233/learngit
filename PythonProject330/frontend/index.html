<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>商品列表（对接真实 MySQL 后端）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
        body{background:#f5f5f5;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        h1{text-align:center;margin-bottom:20px}
        .search{display:flex;gap:10px;margin-bottom:20px}
        .search input{flex:1;padding:10px;border:1px solid #ddd;border-radius:4px}
        .search button{padding:10px 20px;background:#409eff;color:white;border:none;border-radius:4px;cursor:pointer}
        .category{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        .category button{padding:6px 12px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer}
        .category button.active{background:#409eff;color:white;border-color:#409eff}
        .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-bottom:30px}
        .item{background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px #0000001a}
        .item img{width:100%;height:180px;object-fit:cover}
        .info{padding:15px}
        .name{font-size:16px;margin-bottom:8px}
        .price{color:#f56c6c;font-size:18px;font-weight:bold}
        .pagination{display:flex;justify-content:center;gap:6px}
        .pagination button{padding:6px 12px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer}
        .pagination button.active{background:#409eff;color:white}
        .pagination button:disabled{color:#ccc;cursor:not-allowed}
        .empty{grid-column:1/-1;text-align:center;padding:40px;color:#999}
    </style>
</head>
<body>
<div class="container">
    <h1>商品列表</h1>
    <div class="search">
        <input id="name" placeholder="搜索商品">
        <button id="searchBtn">搜索</button>
    </div>
    <div class="category" id="category"></div>
    <div class="list" id="list"></div>
    <div class="pagination" id="pagination"></div>
</div>

<script>
    // 核心配置
    // 后端接口地址（Flask 运行的地址）
    const API = 'http://127.0.0.1:5000'

    // 查询条件（查询后端的参数）
    let page = 1  //当前页码
    const size = 6 //每页几条
    let cid = 0 //分类 ID（0=全部）
    let name = '' //搜索关键词

    // 加载商品分类
    //调用接口：/api/category
    async function loadCategory() {
        //请求后端拿分类数据
        const res = await fetch(API + '/api/category')
        const data = await res.json()

        //把分类渲染成按钮
        const dom = document.getElementById('category')
        dom.innerHTML = `<button class="active" onclick="switchCate(0)">全部</button>`

        //循环生成分类按钮
        data.data.forEach(cate => {
            dom.innerHTML += `<button onclick="switchCate(${cate.id})">${cate.name}</button>`
        })
    }

    // 加载商品列表
    //调用接口：/api/goods
    //传参：page\size\cid\name
    async function loadList() {
    //拼接查询参数
        const params = new URLSearchParams({page, size, cid, name})
    //请求后端商品列表
        const res = await fetch(`${API}/api/goods?${params}`)
        const data = await res.json()
        const list = data.data.list //商品数组
        const total = data.data.total //总条数（分页用）

        const dom = document.getElementById('list')
        dom.innerHTML = ''

        // 无数据时显示空
        if (!list.length) {
            dom.innerHTML = '<div class="empty">暂无商品</div>'
            renderPagination(0)
            return
        }
        // 循环渲染商品卡片
        list.forEach(g => {
            dom.innerHTML += `
            <div class="item">
                <img src="${g.img}" alt="">
                <div class="info">
                    <div class="name">${g.name}</div>
                    <div class="price">¥${g.price}</div>
                </div>
            </div>`
        })
        renderPagination(total)
    }

    // 渲染分页 生成分页按钮
    function renderPagination(total) {
        const totalPage = Math.ceil(total / size)  //总页数
        const dom = document.getElementById('pagination')
        dom.innerHTML = ''
        //上一页
        const prev = document.createElement('button')
        prev.innerText = '上一页'
        prev.disabled = page <= 1
        prev.onclick = () => { page--; loadList() }
        dom.appendChild(prev)

        // 页码 1、2、3...
        for (let i = 1; i <= totalPage; i++) {
            const btn = document.createElement('button')
            btn.innerText = i
            if (i === page) btn.className = 'active'
            btn.onclick = () => { page = i; loadList() }
            dom.appendChild(btn)
        }
        //下一页
        const next = document.createElement('button')
        next.innerText = '下一页'
        next.disabled = page >= totalPage
        next.onclick = () => { page++; loadList() }
        dom.appendChild(next)
    }

    // 切换商品分类
    function switchCate(id) {
        cid = id //选中的分类 ID
        page = 1  //切换分类回到第一页
        document.querySelectorAll('.category button').forEach((b, i) => {
            b.className = i === 0 && id === 0 ? 'active' : ''
        })
        loadList() //重新查询商品
    }

    // 搜索按钮点击
    document.getElementById('searchBtn').onclick = () => {
        name = document.getElementById('name').value.trim()//搜索词
        page = 1
        loadList()
    }

    // 初始化
    loadCategory()
    loadList()
</script>
</body>
</html>
